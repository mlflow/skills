name: "tracing-test"
project_dir: mlflow-agent

setup_script: tests/scripts/setup_tracing_test.py
judges:
  - tests/judges/tracing_skill_invoked.py
  - tests/judges/agent_ran_code.py
  - tests/judges/agent_trace_logged.py

skills:
  - instrumenting-with-mlflow-tracing

prompt: "Enable tracing on the agent, then run the agent to verify that traces are being logged. Do not ask for input."
timeout_seconds: 900
allowed_tools: "Bash,Read,Write,Edit,Grep,Glob,WebFetch"

mlflow_port: 32939
tracking_uri: null

test_runs_dir: /tmp
keep_workdir: true

environment:
  REPO_URL: ""
  OPENAI_API_KEY: ""
